<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mao弾き語りリスト</title>

<style>

body{
font-family:sans-serif;
background:#ffffff;
margin:0;
padding:20px;
color:#333;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

#search{
width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:20px;
}

.header{
display:grid;
grid-template-columns:60px 1fr 1fr;
font-weight:bold;
border-bottom:2px solid #ccc;
padding:10px 0;
}

.song-item{
display:grid;
grid-template-columns:60px 1fr 1fr;
padding:10px 0;
border-bottom:1px solid #eee;
}

.initial{
color:#888;
font-weight:bold;
}

.song-name{
font-weight:bold;
}

.artist-name{
color:#555;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🐰 歌える曲リスト 🐰</h1>

<input id="search" type="text" placeholder="曲名・アーティスト検索..." oninput="filterSongs()">

<div class="header">
<div>頭文字</div>
<div>曲名</div>
<div>アーティスト</div>
</div>

<div id="songList">

<div class="song-item">
<div class="initial">A</div>
<div class="song-name">Alone</div>
<div class="artist-name">岡本真夜</div>
</div>

<div class="song-item">
<div class="initial">ア</div>
<div class="song-name">アイドル</div>
<div class="artist-name">YOASOBI</div>
</div>

</div>
</div>

<script>

function filterSongs(){
const query=document.getElementById("search").value.toLowerCase();
const songs=document.querySelectorAll(".song-item");

songs.forEach(song=>{
const text=song.textContent.toLowerCase();
song.classList.toggle("hidden",!text.includes(query));
});
}

</script>

</body>
</html>

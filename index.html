<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mao弾き歌いリスト</title>
  <style>
    :root {
      --bg: #fff8fb;
      --card: #ffffff;
      --text: #332a30;
      --sub: #7b6c74;
      --accent: #f59fbc;
      --accent-strong: #ec6d96;
      --line: #f2d7e1;
      --shadow: 0 10px 28px rgba(177, 92, 121, .12);
      --hero-focus-y: 0px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at top, #fff4f8 0%, #fff8fb 32%, #fff 100%);
      color: var(--text);
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 32px;
    }
    .hero {
      width: 100%;
      aspect-ratio: 16 / 7;
      min-height: 180px;
      max-height: 300px;
      overflow: hidden;
      background: #f7dce5;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center var(--hero-focus-y);
      display: block;
    }
    .sticky-area {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(10px);
      background: rgba(255, 248, 251, .88);
      border-bottom: 1px solid rgba(242, 215, 225, .9);
    }
    .inner {
      padding: 12px 14px 10px;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px 16px 14px 44px;
      font-size: 16px;
      outline: none;
      box-shadow: var(--shadow);
    }
    .search-wrap input:focus {
      border-color: #f1a5bd;
      box-shadow: 0 0 0 4px rgba(245, 159, 188, .18);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: .65;
      pointer-events: none;
    }
    .top-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .tabs {
      display: inline-flex;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--shadow);
    }
    .tab {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }
    .count {
      font-size: 13px;
      color: var(--sub);
      white-space: nowrap;
      padding-right: 2px;
    }
    .jump {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .jump::-webkit-scrollbar { display: none; }
    .jump button {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: #6c4d5a;
      border-radius: 999px;
      padding: 8px 11px;
      min-width: 36px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(177, 92, 121, .08);
    }
    .jump button:hover {
      border-color: #efafc3;
    }
    .section {
      padding: 14px;
    }
    .empty {
      display: none;
      padding: 36px 22px 20px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
    }
    .song-list {
      display: grid;
      gap: 10px;
    }
    .song-item {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 12px;
      align-items: start;
      background: var(--card);
      border: 1px solid #f6dbe5;
      border-radius: 18px;
      padding: 12px 13px;
      box-shadow: var(--shadow);
      scroll-margin-top: 174px;
    }
    .initial {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #ffe2ec, #ffd3e1);
      color: #a25070;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 15px;
    }
    .meta {
      min-width: 0;
    }
    .title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
      word-break: break-word;
    }
    .artist {
      margin-top: 4px;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
    }
    .memo {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #a06d7f;
      background: #fff5f8;
      border: 1px solid #f7dce6;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 600;
      max-width: 100%;
      word-break: break-word;
    }
    .memo:empty { display: none; }
    .fav-btn {
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 23px;
      line-height: 1;
      padding: 4px 2px;
      color: #d7b3c0;
      align-self: center;
    }
    .fav-btn.active {
      color: #ffb700;
      filter: drop-shadow(0 4px 10px rgba(255, 183, 0, .2));
    }
    .footer-space {
      height: 18px;
    }
    @media (max-width: 480px) {
      .inner { padding: 10px 10px 9px; }
      .section { padding: 10px; }
      .song-item { grid-template-columns: 38px 1fr auto; padding: 11px; border-radius: 16px; }
      .initial { width: 38px; height: 38px; border-radius: 12px; font-size: 14px; }
      .title { font-size: 15px; }
      .artist { font-size: 13px; }
      .count { font-size: 12px; }
    }
  </style>
</head>

        const id = songId(song);
        const isFav = favorites.has(id);
        const memoHtml = song.memo ? `<div class="memo">🎼 ${escapeHtml(song.memo)}</div>` : '';
        return `
          <div class="song-item" data-initial="${escapeAttr(song.initial)}" data-id="${escapeAttr(id)}">
            <div class="initial">${escapeHtml(song.initial)}</div>
            <div class="meta">
              <div class="title">${escapeHtml(song.title)}</div>
              <div class="artist">${escapeHtml(song.artist)}</div>
              ${memoHtml}
            </div>
            <button class="fav-btn ${isFav ? 'active' : ''}" type="button" aria-label="favorite">${isFav ? '★' : '☆'}</button>
          </div>
        `;
      }).join('');

      countText.textContent = `${filtered.length}曲`;
      emptyState.style.display = filtered.length ? 'none' : 'block';

      document.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const item = e.currentTarget.closest('.song-item');
          const id = item.dataset.id;
          if (favorites.has(id)) {
            favorites.delete(id);
          } else {
            favorites.add(id);
          }
          saveFavorites();
          render();
        });
      });
    }

    function jumpTo(letter) {
      const items = [...document.querySelectorAll('.song-item')];
      const target = items.find(item => (item.dataset.initial || '').startsWith(letter));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(text) {
      return escapeHtml(text).replaceAll('`', '&#96;');
    }

    searchBox.addEventListener('input', (e) => {
      keyword = e.target.value.trim().toLowerCase();
      render();
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        mode = tab.dataset.mode;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        render();
      });
    });

    jumpButtons.forEach(btn => {
      btn.addEventListener('click', () => jumpTo(btn.dataset.jump));
    });

    render();
  </script>
</body>
</html>
